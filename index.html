<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Pro V11.7 - PDF Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --bg-main: #2c3e50; --bg-card: #ffffff; 
            --primary: #3498db; --g6: #27ae60;      
            --time-a: #2980b9; --time-b: #c0392b;
            --cor-am: #f1c40f; --cor-vm: #e74c3c;
            --ouro: #ffd700; --prata: #c0c0c0; --as-icon: #00CED1;
            --bronze: #cd7f32; --ferro: #a19d94;
            --bg-edit: #34495e; 
        }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-main); margin: 0; padding: 5px; color: #2c3e50; }
        .container { max-width: 100%; margin: auto; }
        .card-panel { background: var(--bg-card); padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 10px; }
        
        /* RANKINGS OURO/PRATA/BRONZE/FERRO */
        .rank-ouro { background: linear-gradient(90deg, #ffd700, #ffecb3) !important; color: black !important; font-weight: bold; }
        .rank-prata { background: linear-gradient(90deg, #c0c0c0, #e0e0e0) !important; color: black !important; }
        .rank-bronze { background: linear-gradient(90deg, #cd7f32, #dfa87a) !important; color: white !important; }
        .rank-ferro { background: #f1f5f9 !important; color: #475569 !important; }

        /* RANKING CLASSIFICAÇÃO GERAL */
        .rank-topo-1 { background: linear-gradient(90deg, #1b5e20, #2e7d32) !important; color: white !important; }
        .rank-topo-2 { background: linear-gradient(90deg, #2e7d32, #4caf50) !important; color: white !important; }
        .rank-topo-3 { background: linear-gradient(90deg, #4caf50, #8bc34a) !important; color: white !important; }
        .rank-meio-verde { background: linear-gradient(90deg, #8bc34a, #cddc39) !important; color: black !important; }
        .rank-meio-amarelo { background: linear-gradient(90deg, #d4e157, #ffeb3b) !important; color: black !important; }
        .rank-z4 { background: linear-gradient(90deg, #e53935, #b71c1c) !important; color: white !important; }

        .table-wrap { overflow-x: auto; border-radius: 8px; width: 100%; }
        table { width: 100%; border-collapse: collapse; font-size: 0.62rem; }
        th { background: #f8f9fa; padding: 8px 2px; color: #7f8c8d; font-size: 0.48rem; text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 10px 2px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); white-space: nowrap; height: 42px; }
        .col-atleta { text-align: left !important; padding-left: 8px !important; font-weight: bold; }

        .icon-trophy { width: 17px; height: 17px; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.48rem; color: #000; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        .ic-mvp { background: var(--ouro); } .ic-at { background: var(--prata); } .ic-as { background: var(--as-icon); }
        .badge-card { padding: 2px 4px; border-radius: 3px; font-weight: bold; font-size: 0.55rem; }
        .b-am { background: var(--cor-am); color: black; } .b-vm { background: var(--cor-vm); color: white; }

        .filter-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
        .btn-filter { padding: 12px; background: rgba(255,255,255,0.1); color: white; font-size: 0.7rem; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }
        .btn-filter.active { background: var(--primary); border-color: white; }

        .scout-row-horizontal { display: grid; grid-template-columns: 1.2fr repeat(5, 38px) 35px; gap: 5px; align-items: center; padding: 8px 5px; border-radius: 8px; margin-bottom: 5px; color: white; }
        .scout-row-horizontal input { width: 100%; text-align: center; border-radius: 5px; border: none; font-weight: bold; height: 30px; }
        .area-escalacao { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 8px; background: rgba(0,0,0,0.2); }
        .lista-scroll { height: 180px; overflow-y: auto; }
        .atleta-check { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; margin-bottom: 4px; border-radius: 6px; font-size: 0.7rem; color: #ecf0f1; border-left: 4px solid transparent; }
        .check-item-A { background: rgba(52, 152, 219, 0.1); border-color: var(--time-a); }
        .check-item-B { background: rgba(231, 76, 60, 0.1); border-color: var(--time-b); }
    </style>
</head>
<body>

<div class="container">
    <div class="card-panel" style="background: var(--bg-edit); color: white;">
        <input type="text" id="campeonatoNome" style="width: 100%; font-size: 1.1rem; font-weight: bold; margin-bottom:12px; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.3); color:white; text-align:center;" oninput="salvarConfigs()">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <div style="text-align:center; font-size:0.5rem;">VIT<input type="number" id="ptsVit" oninput="salvarConfigs()" style="width:90%; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:4px; text-align:center;"></div>
            <div style="text-align:center; font-size:0.5rem;">EMP<input type="number" id="ptsEmp" oninput="salvarConfigs()" style="width:90%; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:4px; text-align:center;"></div>
            <div style="text-align:center; font-size:0.5rem;">DER<input type="number" id="ptsDer" oninput="salvarConfigs()" style="width:90%; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:4px; text-align:center;"></div>
            <div style="text-align:center; font-size:0.5rem;">FLT(-)<input type="number" id="ptsFlt" oninput="salvarConfigs()" style="width:90%; background:rgba(255,255,255,0.1); border:none; color:white; border-radius:4px; text-align:center;"></div>
        </div>
        <div style="display: flex; gap: 8px; margin-top: 15px;">
            <button onclick="copiarBackup()" style="flex:1; background:#2ecc71; color:white; border:none; padding:8px; border-radius:6px; font-size:0.6rem; font-weight:bold">COPIAR BACKUP</button>
            <button onclick="restaurarBackup()" style="flex:1; background:#f39c12; color:white; border:none; padding:8px; border-radius:6px; font-size:0.6rem; font-weight:bold">RESTAURAR</button>
        </div>
    </div>

    <div class="card-panel">
        <div style="display: flex; gap: 5px; margin-bottom: 8px;">
            <input type="text" id="novoNome" placeholder="Atleta..." maxlength="15" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd">
            <button onclick="adicionarJogador()" style="background:var(--primary); color:white; width:60px; border-radius:8px; border:none; font-weight:bold">ADD</button>
        </div>
        <div style="display: flex; gap: 5px;">
            <select id="deleteSelect" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd;"></select>
            <button onclick="excluirJogador()" style="background:var(--cor-vm); color:white; width:70px; border-radius:8px; border:none; font-size: 0.6rem;">EXCLUIR</button>
        </div>
    </div>

    <div style="background: var(--bg-edit); border-radius: 12px; overflow: hidden; margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-around; padding: 15px; color: white;">
            <div style="text-align:center"><small>TIME A</small><br><input type="number" id="scoreA" value="0" readonly style="width:50px; text-align:center; background:var(--time-a); color:white; border:none; border-radius:6px; font-size:1.5rem; font-weight:bold"></div>
            <div style="font-weight:bold; opacity:0.3; align-self:center; font-size:1.5rem;">X</div>
            <div style="text-align:center"><small>TIME B</small><br><input type="number" id="scoreB" value="0" readonly style="width:50px; text-align:center; background:var(--time-b); color:white; border:none; border-radius:6px; font-size:1.5rem; font-weight:bold"></div>
        </div>
        <div class="area-escalacao">
            <div id="listaA" class="lista-scroll"></div>
            <div id="listaB" class="lista-scroll"></div>
        </div>
    </div>

    <div class="card-panel" style="padding: 5px;">
        <div id="inputsA"></div>
        <div id="inputsB" style="margin-top:5px;"></div>
        <button onclick="registrarPartida()" style="background:var(--g6); color:white; width:100%; padding:15px; font-weight:bold; border:none; border-radius:10px; margin-top:10px; font-size:1rem;">GRAVAR PARTIDA</button>
    </div>

    <div class="filter-menu">
        <button class="btn-filter active" id="btn-pts" onclick="setFiltro('pts')">Classificação Geral</button>
        <button class="btn-filter" id="btn-gp_individual" onclick="setFiltro('gp_individual')" style="background:#e67e22">Artilheiros</button>
        <button class="btn-filter" id="btn-assist" onclick="setFiltro('assist')" style="background:#9b59b6">Assistentes</button>
        <button class="btn-filter" id="btn-mvp" onclick="setFiltro('mvp')" style="background:#f1c40f; color:black">Craques (MVP)</button>
        <button class="btn-filter" id="btn-cartoes" onclick="setFiltro('cartoes')" style="background:#e74c3c">Cartões (A/V/T)</button>
        <button class="btn-filter" id="btn-faltas" onclick="setFiltro('faltas')" style="background:#95a5a6">Faltas</button>
        <button class="btn-filter" id="btn-time" onclick="setFiltro('time')" style="background:#1abc9c">Gols Time (GP/GC)</button>
        <button onclick="compartilharPDF()" style="background:#fff; color:#2c3e50; border-radius:8px; font-weight:bold; font-size: 0.7rem; border:2px solid #2c3e50">GERAR PDF 📄</button>
    </div>

    <div class="card-panel" style="padding:2px" id="area-pdf">
        <h3 id="pdfTitulo" style="text-align: center; margin: 8px 0; font-size: 1rem;"></h3>
        <div class="table-wrap">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card-panel" style="background: var(--bg-edit); color: white; margin-top:10px;">
        <h4 style="text-align:center; font-size:0.75rem; opacity:0.8; margin-bottom:10px;">AJUSTE MANUAL DO ATLETA</h4>
        <select id="editSelect" onchange="carregarEdicao()" style="width:100%; padding:10px; border-radius:8px; margin-bottom:12px; background: #2c3e50; color:white; border:1px solid #455a64;"></select>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
            <div style="text-align:center"><label style="font-size:0.45rem">GOLS IND.</label><input type="number" id="eGpI" style="width:90%; background:var(--prata); border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">ASSIS</label><input type="number" id="eAss" style="width:90%; background:var(--as-icon); border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">MVP</label><input type="number" id="eMvp" style="width:90%; background:var(--ouro); border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">AMAR</label><input type="number" id="eAm" style="width:90%; background:var(--cor-am); border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">VERM</label><input type="number" id="eVm" style="width:90%; background:var(--cor-vm); color:white; border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">FLT</label><input type="number" id="eFlt" style="width:90%; background:#ff80ab; border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">GP TIME</label><input type="number" id="eGpT" style="width:90%; background:var(--time-a); color:white; border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">GC TIME</label><input type="number" id="eGcT" style="width:90%; background:var(--time-b); color:white; border-radius:4px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
            <div style="text-align:center"><label style="font-size:0.45rem">JOGOS</label><input type="number" id="eJog" style="width:90%; background:#95a5a6; border-radius:5px; border:none; padding:8px; text-align:center; font-weight:bold"></div>
        </div>
        <button onclick="salvarAjuste()" style="width:100%; padding:15px; margin-top:12px; background:var(--g6); color:white; border:none; border-radius:10px; font-weight:bold;">SALVAR ALTERAÇÕES</button>
    </div>

    <div id="historicoLista" style="margin-top:15px;"></div>
</div>

<script>
    let jogadores = JSON.parse(localStorage.getItem('mpro_v117_players')) || [];
    let configs = JSON.parse(localStorage.getItem('mpro_v117_configs')) || { nome: "MEU CAMPEONATO 2026", vit: 3, emp: 1, der: 0, flt: 1 };
    let historico = JSON.parse(localStorage.getItem('mpro_v117_hist')) || [];
    let filtroAtual = 'pts';

    function carregarConfigsIniciais() {
        document.getElementById('campeonatoNome').value = configs.nome;
        document.getElementById('ptsVit').value = configs.vit;
        document.getElementById('ptsEmp').value = configs.emp;
        document.getElementById('ptsDer').value = configs.der;
        document.getElementById('ptsFlt').value = configs.flt;
        document.getElementById('pdfTitulo').innerText = configs.nome;
        renderizarHistorico();
    }

    function salvarConfigs() {
        configs = { nome: document.getElementById('campeonatoNome').value, vit: parseInt(document.getElementById('ptsVit').value) || 0, emp: parseInt(document.getElementById('ptsEmp').value) || 0, der: parseInt(document.getElementById('ptsDer').value) || 0, flt: parseInt(document.getElementById('ptsFlt').value) || 0 };
        document.getElementById('pdfTitulo').innerText = configs.nome;
        localStorage.setItem('mpro_v117_configs', JSON.stringify(configs));
        renderizarTabela();
    }

    function renderizarTabela() {
        jogadores.forEach(j => {
            j.pts = (j.v * configs.vit) + (j.e * configs.emp) + (j.d * configs.der) - (j.faltas * configs.flt);
            j.sg = (j.gp_time || 0) - (j.gc_time || 0);
            j.total_cards = (j.am || 0) + (j.vm || 0);
        });

        if(filtroAtual === 'cartoes') jogadores.sort((a,b) => b.total_cards - a.total_cards || b.vm - a.vm);
        else if(filtroAtual === 'faltas') jogadores.sort((a,b) => b.faltas - a.faltas);
        else if(filtroAtual === 'time') jogadores.sort((a,b) => b.sg - a.sg || b.gp_time - a.gp_time);
        else jogadores.sort((a,b) => b[filtroAtual] - a[filtroAtual] || b.sg - a.sg || b.gp_individual - a.gp_individual);

        let h = `<tr><th style="width:20px">#</th><th class="col-atleta">Atleta</th>`;
        if(filtroAtual === 'pts') h += `<th>Pts</th><th>J</th><th>V/E/D</th><th>GP</th><th>GC</th><th>SG</th><th>M/A/A</th><th>A/V/T</th>`;
        else if(filtroAtual === 'cartoes') h += `<th>AM</th><th>VM</th><th>TOTAL</th><th>J</th><th>SG</th>`;
        else if(filtroAtual === 'time') h += `<th>GP Time</th><th>GC Time</th><th>SG</th><th>J</th>`;
        else h += `<th>${filtroAtual.toUpperCase()}</th><th>J</th><th>SG</th>`;
        document.getElementById('tableHead').innerHTML = h + `</tr>`;

        document.getElementById('tableBody').innerHTML = jogadores.map((j, i) => {
            let pos = i + 1; let cor = "";
            if (filtroAtual === 'pts') {
                if (pos === 1) cor = "rank-topo-1"; else if (pos === 2) cor = "rank-topo-2"; else if (pos === 3) cor = "rank-topo-3";
                else if (pos <= Math.ceil(jogadores.length * 0.4)) cor = "rank-meio-verde";
                else if (pos <= Math.ceil(jogadores.length * 0.6)) cor = "rank-meio-amarelo";
                else if (pos > jogadores.length - 3) cor = "rank-z4";
            } else {
                if (pos === 1) cor = "rank-ouro"; else if (pos === 2) cor = "rank-prata"; else if (pos === 3) cor = "rank-bronze"; else cor = "rank-ferro";
            }
            let row = `<tr class="${cor}"><td>${pos}º</td><td class="col-atleta">${j.nome}</td>`;
            if(filtroAtual === 'pts') {
                row += `<td><b>${j.pts}</b></td><td>${j.j}</td><td>${j.v}/${j.e}/${j.d}</td><td>${j.gp_time}</td><td>${j.gc_time}</td><td>${j.sg}</td>
                        <td><div style="display:flex; justify-content:center; gap:2px"><div class="icon-trophy ic-mvp">${j.mvp}</div><div class="icon-trophy ic-at">${j.gp_individual}</div><div class="icon-trophy ic-as">${j.assist}</div></div></td>
                        <td><span class="badge-card b-am">${j.am}</span>|<span class="badge-card b-vm">${j.vm}</span>|<b>${j.total_cards}</b></td>`;
            } else if(filtroAtual === 'cartoes') {
                row += `<td><span class="badge-card b-am">${j.am}</span></td><td><span class="badge-card b-vm">${j.vm}</span></td><td><span class="badge-card">${j.total_cards}</span></td><td>${j.j}</td><td>${j.sg}</td>`;
            } else if(filtroAtual === 'time') {
                row += `<td>${j.gp_time}</td><td>${j.gc_time}</td><td><b>${j.sg}</b></td><td>${j.j}</td>`;
            } else { row += `<td><b>${j[filtroAtual]}</b></td><td>${j.j}</td><td>${j.sg}</td>`; }
            return row + `</tr>`;
        }).join('');
    }

    // FUNÇÃO PDF REVISADA
    function compartilharPDF() {
        if (typeof html2pdf === 'undefined') {
            alert("A biblioteca de PDF ainda está carregando. Verifique sua internet.");
            return;
        }
        const el = document.getElementById('area-pdf');
        const opt = {
            margin: 5,
            filename: configs.nome + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(el).save().catch(err => alert("Erro ao gerar: " + err));
    }

    function registrarPartida() {
        const scouts = document.querySelectorAll('.scout-row-horizontal');
        if(scouts.length === 0) return alert("Selecione os atletas!");
        const sA = parseInt(document.getElementById('scoreA').value);
        const sB = parseInt(document.getElementById('scoreB').value);
        let dP = { id: Date.now(), data: new Date().toLocaleString(), placar: `${sA} x ${sB}`, atletas: [] };
        scouts.forEach(div => {
            const j = jogadores.find(x => x.id == div.dataset.id);
            const r = { id: j.id, gp: parseInt(div.querySelector('.i-gp').value) || 0, as: parseInt(div.querySelector('.i-as').value) || 0, fl: parseInt(div.querySelector('.i-fl').value) || 0, am: parseInt(div.querySelector('.i-am').value) || 0, vm: parseInt(div.querySelector('.i-vm').value) || 0, mvp: div.querySelector('.i-mvp-check').checked ? 1 : 0, time: div.dataset.time, v: 0, e: 0, d: 0 };
            if(r.time === 'A') { if(sA > sB) r.v=1; else if(sA < sB) r.d=1; else r.e=1; j.gp_time += sA; j.gc_time += sB; }
            else { if(sB > sA) r.v=1; else if(sB < sA) r.d=1; else r.e=1; j.gp_time += sB; j.gc_time += sA; }
            j.j++; j.v += r.v; j.e += r.e; j.d += r.d; j.gp_individual += r.gp; j.assist += r.as; j.faltas += r.fl; j.am += r.am; j.vm += r.vm; j.mvp += r.mvp;
            dP.atletas.push(r);
        });
        historico.unshift(dP); salvarETualizar();
    }

    function estornarPartida(id) {
        if(!confirm("Estornar esta partida?")) return;
        const p = historico.find(x => x.id === id);
        const sc = p.placar.split(' x ');
        const sA = parseInt(sc[0]), sB = parseInt(sc[1]);
        p.atletas.forEach(at => {
            const j = jogadores.find(x => x.id === at.id);
            if(j) {
                j.j--; j.v -= at.v; j.e -= at.e; j.d -= at.d; j.gp_individual -= at.gp; j.assist -= at.as; j.faltas -= at.fl; j.am -= at.am; j.vm -= at.vm; j.mvp -= at.mvp;
                if(at.time === 'A') { j.gp_time -= sA; j.gc_time -= sB; } else { j.gp_time -= sB; j.gc_time -= sA; }
            }
        });
        historico = historico.filter(x => x.id !== id); salvarETualizar();
    }

    function carregarEdicao() {
        const j = jogadores.find(x => x.id == document.getElementById('editSelect').value);
        if(!j) return;
        document.getElementById('eGpI').value = j.gp_individual; document.getElementById('eAss').value = j.assist;
        document.getElementById('eMvp').value = j.mvp; document.getElementById('eAm').value = j.am;
        document.getElementById('eVm').value = j.vm; document.getElementById('eFlt').value = j.faltas;
        document.getElementById('eGpT').value = j.gp_time; document.getElementById('eGcT').value = j.gc_time;
        document.getElementById('eJog').value = j.j;
    }

    function salvarAjuste() {
        const j = jogadores.find(x => x.id == document.getElementById('editSelect').value);
        if(!j) return;
        j.gp_individual = parseInt(document.getElementById('eGpI').value) || 0;
        j.assist = parseInt(document.getElementById('eAss').value) || 0;
        j.mvp = parseInt(document.getElementById('eMvp').value) || 0;
        j.am = parseInt(document.getElementById('eAm').value) || 0;
        j.vm = parseInt(document.getElementById('eVm').value) || 0;
        j.faltas = parseInt(document.getElementById('eFlt').value) || 0;
        j.gp_time = parseInt(document.getElementById('eGpT').value) || 0;
        j.gc_time = parseInt(document.getElementById('eGcT').value) || 0;
        j.j = parseInt(document.getElementById('eJog').value) || 0;
        localStorage.setItem('mpro_v117_players', JSON.stringify(jogadores));
        renderizarTabela(); alert("Ajustado!");
    }

    function atualizarVisual() {
        renderizarTabela();
        const gen = (p) => jogadores.map(j => `<label class="atleta-check check-item-${p}" id="c-${p}-${j.id}"><span>${j.nome}</span><input type="checkbox" value="${j.id}" class="check-${p}" onchange="bloquearOutro('${j.id}', '${p}')"></label>`).join('');
        document.getElementById('listaA').innerHTML = gen('A');
        document.getElementById('listaB').innerHTML = gen('B');
        const opts = '<option value="">Selecionar Atleta...</option>' + jogadores.map(j => `<option value="${j.id}">${j.nome}</option>`).join('');
        document.getElementById('editSelect').innerHTML = opts;
        document.getElementById('deleteSelect').innerHTML = opts;
    }

    function bloquearOutro(id, p) {
        const outro = p === 'A' ? 'B' : 'A';
        const cb = document.querySelector(`.check-${p}[value="${id}"]`);
        const item = document.getElementById(`c-${outro}-${id}`);
        if(item) item.style.display = cb.checked ? "none" : "flex";
        gerarCampos();
    }

    function gerarCampos() {
        ['A', 'B'].forEach(p => {
            const checks = Array.from(document.querySelectorAll(`.check-${p}:checked`));
            document.getElementById('inputs' + p).innerHTML = checks.map(c => {
                const j = jogadores.find(x => x.id == c.value);
                return `<div class="scout-row-horizontal" style="background:${p === 'A' ? 'var(--time-a)' : 'var(--time-b)'}" data-id="${j.id}" data-time="${p}">
                    <b style="font-size:0.52rem;">${j.nome}</b>
                    <input type="number" class="i-gp" value="0" oninput="sincronizarPlacar()">
                    <input type="number" class="i-as" value="0">
                    <input type="number" class="i-fl" value="0">
                    <input type="number" class="i-am" style="background:#fff9c4; color:black">
                    <input type="number" class="i-vm" style="background:#ffcdd2; color:black">
                    <input type="checkbox" class="i-mvp-check">
                </div>`;
            }).join('');
        });
        sincronizarPlacar();
    }

    function sincronizarPlacar() {
        let sA = 0, sB = 0;
        document.querySelectorAll('#inputsA .i-gp').forEach(i => sA += parseInt(i.value) || 0);
        document.querySelectorAll('#inputsB .i-gp').forEach(i => sB += parseInt(i.value) || 0);
        document.getElementById('scoreA').value = sA; document.getElementById('scoreB').value = sB;
    }

    function setFiltro(f) {
        filtroAtual = f;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + f).classList.add('active');
        renderizarTabela();
    }

    function adicionarJogador() {
        const n = document.getElementById('novoNome').value.trim(); if(!n) return;
        jogadores.push({ id: Date.now(), nome: n, v:0, e:0, d:0, j:0, pts:0, gp_time:0, gc_time:0, sg:0, gp_individual:0, assist:0, faltas:0, am:0, vm:0, mvp:0 });
        document.getElementById('novoNome').value = ""; atualizarVisual();
    }

    function excluirJogador() {
        const id = document.getElementById('deleteSelect').value;
        if(id && confirm("Excluir?")) { jogadores = jogadores.filter(j => j.id != id); atualizarVisual(); }
    }

    function copiarBackup() { const d = btoa(unescape(encodeURIComponent(JSON.stringify({jogadores, configs, historico})))); navigator.clipboard.writeText(d).then(() => alert("Backup Copiado!")); }
    function restaurarBackup() { const c = prompt("Cole o código:"); if(c) { try { const dec = JSON.parse(decodeURIComponent(escape(atob(c)))); jogadores = dec.jogadores; configs = dec.configs; historico = dec.historico; salvarETualizar(); } catch(e) { alert("Erro!"); } } }
    function salvarETualizar() { localStorage.setItem('mpro_v117_players', JSON.stringify(jogadores)); localStorage.setItem('mpro_v117_configs', JSON.stringify(configs)); localStorage.setItem('mpro_v117_hist', JSON.stringify(historico)); location.reload(); }
    function renderizarHistorico() { document.getElementById('historicoLista').innerHTML = historico.map(p => `<div class="card-panel" style="display:flex; justify-content:space-between; align-items:center; padding:10px;"><div><small style="opacity:0.6">${p.data}</small><br><b>${p.placar}</b></div><button class="btn-undo" onclick="estornarPartida(${p.id})">ESTORNAR</button></div>`).join(''); }

    window.onload = () => { carregarConfigsIniciais(); atualizarVisual(); };
</script>
</body>
</html>
